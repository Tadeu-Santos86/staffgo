<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StaffGo</title>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; margin:0; }
button { padding:10px; margin:5px; border:none; border-radius:6px; cursor:pointer; }
input, textarea { width:100%; padding:10px; margin:5px 0; border-radius:6px; border:none; }
.vaga { background:#1e293b; padding:15px; margin:10px; border-radius:10px; }
.oculto { display:none; }

.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
}

.modal-content {
  background:#1e293b;
  padding:20px;
  margin:10% auto;
  width:90%;
  max-width:400px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2 style="text-align:center">StaffGo</h2>

<div style="text-align:center">
  <button onclick="abrirSecao('secao-vagas')">Ver vagas</button>
  <button onclick="abrirSecao('secao-candidato')">Sou candidato</button>
</div>

<div id="secao-vagas">
  <div id="vagas"></div>
</div>

<div id="secao-candidato" class="oculto">
  <h3>Minhas candidaturas</h3>
  <div id="minhas-candidaturas"></div>
</div>

<!-- MODAL EDITAR -->
<div id="modal-editar" class="modal">
  <div class="modal-content">
    <h3>Editar candidatura</h3>

    <input id="edit-nome" placeholder="Nome">
    <input id="edit-whatsapp" placeholder="WhatsApp">
    <textarea id="edit-experiencia" placeholder="Experiência"></textarea>

    <button onclick="salvarEdicaoCandidatura()">Salvar</button>
    <button onclick="fecharModalEditar()">Cancelar</button>
  </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
