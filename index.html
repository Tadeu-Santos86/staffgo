<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>StaffGo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
      color: #22c55e;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .botoes {
      margin-bottom: 30px;
    }

    button {
      margin: 8px;
      padding: 12px 24px;
      border: none;
      background: #22c55e;
      color: black;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .botao-secundario {
      background: #38bdf8;
      color: #0f172a;
    }

    .botao-alerta {
      background: #ef4444;
      color: white;
    }

    .secao {
      max-width: 950px;
      margin: 0 auto 30px auto;
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      display: none;
      text-align: left;
    }

    .secao h2 {
      text-align: center;
      margin-top: 0;
      color: white;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #cbd5e1;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0 16px 0;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .vaga, .candidato, .auth-box {
      margin-top: 15px;
      padding: 18px;
      background: #334155;
      border-radius: 10px;
    }

    .vaga h3, .candidato h3 {
      margin: 0 0 8px 0;
      color: #22c55e;
    }

    .vaga p, .candidato p, .auth-box p {
      margin: 4px 0;
      font-size: 16px;
      color: #e2e8f0;
    }

    .acoes-vaga, .acoes-candidato {
      margin-top: 12px;
    }

    .topo-acoes {
      text-align: center;
      margin-bottom: 20px;
    }

    .mensagem {
      text-align: center;
      color: #cbd5e1;
      margin-top: 15px;
      font-size: 15px;
    }

    .modal-fundo {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .modal {
      max-width: 700px;
      margin: 40px auto;
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      text-align: left;
    }

    .modal h2 {
      text-align: center;
      margin-top: 0;
    }

    .fechar {
      background: #ef4444;
      color: white;
    }

    .subtitulo {
      color: #94a3b8;
      text-align: center;
      margin-bottom: 20px;
    }

    .linha {
      border-top: 1px solid #475569;
      margin: 30px 0;
    }

    .oculto {
      display: none;
    }
  </style>
</head>
<body>

  <h1>StaffGo 🚀</h1>
  <p>Conectando empresas e profissionais</p>

  <div class="botoes">
    <button onclick="abrirSecao('secao-vagas')">Ver vagas</button>
    <button onclick="abrirSecao('secao-empresa')">Sou empresa</button>
  </div>

  <div id="secao-vagas" class="secao">
    <h2>Vagas disponíveis</h2>
    <div class="topo-acoes">
      <button onclick="carregarVagas()">Atualizar vagas</button>
    </div>
    <div id="vagas"></div>
    <div id="mensagem-vagas" class="mensagem"></div>
  </div>

  <div id="secao-empresa" class="secao">
    <h2>Painel da empresa</h2>
    <p class="subtitulo">Cadastro, login, vagas e candidatos</p>

    <div id="empresa-auth" class="auth-box">
      <h2>Acesso da empresa</h2>

      <label for="empresa-nome-cadastro">Nome da empresa</label>
      <input type="text" id="empresa-nome-cadastro" placeholder="Ex: Hotel Modelo">

      <label for="empresa-email">E-mail</label>
      <input type="email" id="empresa-email" placeholder="Ex: contato@empresa.com">

      <label for="empresa-senha">Senha</label>
      <input type="password" id="empresa-senha" placeholder="Digite sua senha">

      <button onclick="cadastrarEmpresa()">Cadastrar empresa</button>
      <button class="botao-secundario" onclick="loginEmpresa()">Entrar</button>

      <div id="mensagem-auth" class="mensagem"></div>
    </div>

    <div id="empresa-logada-box" class="auth-box oculto">
      <h2>Empresa logada</h2>
      <p><strong>Empresa:</strong> <span id="empresa-logada-nome">-</span></p>
      <p><strong>E-mail:</strong> <span id="empresa-logada-email">-</span></p>
      <div class="topo-acoes">
        <button class="botao-alerta" onclick="logoutEmpresa()">Sair</button>
      </div>
    </div>

    <div id="empresa-painel-conteudo" class="oculto">
      <div class="linha"></div>

      <label for="titulo">Título da vaga</label>
      <input type="text" id="titulo" placeholder="Ex: Recepcionista de Hotel">

      <label for="empresa">Empresa</label>
      <input type="text" id="empresa" placeholder="Ex: Resort Luxo SP">

      <label for="cidade">Cidade</label>
      <input type="text" id="cidade" placeholder="Ex: São Paulo">

      <label for="salario">Salário</label>
      <input type="text" id="salario" placeholder="Ex: R$ 2.000">

      <label for="descricao">Descrição</label>
      <textarea id="descricao" placeholder="Ex: Atendimento ao cliente, check-in e suporte"></textarea>

      <button onclick="salvarOuAtualizarVaga()">Salvar vaga</button>
      <button class="botao-secundario" onclick="limparFormularioVaga()">Limpar formulário</button>

      <div id="mensagem-empresa" class="mensagem"></div>

      <div class="linha"></div>

      <h2>Minhas vagas</h2>
      <div class="topo-acoes">
        <button onclick="carregarVagasEmpresa()">Atualizar minhas vagas</button>
      </div>
      <div id="vagas-empresa"></div>
      <div id="mensagem-vagas-empresa" class="mensagem"></div>
    </div>
  </div>

  <div id="modal-candidatura-fundo" class="modal-fundo">
    <div class="modal">
      <h2>Candidatar-se à vaga</h2>

      <label for="cand-nome">Nome</label>
      <input type="text" id="cand-nome" placeholder="Seu nome completo">

      <label for="cand-whatsapp">WhatsApp</label>
      <input type="text" id="cand-whatsapp" placeholder="Ex: 11999999999">

      <label for="cand-experiencia">Experiência</label>
      <textarea id="cand-experiencia" placeholder="Ex: Trabalhei 2 anos em hotelaria"></textarea>

      <button onclick="enviarCandidatura()">Enviar candidatura</button>
      <button class="fechar" onclick="fecharModalCandidatura()">Fechar</button>

      <div id="mensagem-candidatura" class="mensagem"></div>
    </div>
  </div>

  <div id="modal-candidatos-fundo" class="modal-fundo">
    <div class="modal">
      <h2>Candidatos da vaga</h2>
      <div id="lista-candidatos"></div>
      <div id="mensagem-candidatos" class="mensagem"></div>
      <button class="fechar" onclick="fecharModalCandidatos()">Fechar</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
