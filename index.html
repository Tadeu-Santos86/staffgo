<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>StaffGo</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

button {
  margin: 5px;
  padding: 10px;
  cursor: pointer;
}

input, textarea {
  display: block;
  margin: 10px 0;
  padding: 8px;
  width: 300px;
}

.vaga {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
}

.oculto {
  display: none;
}
</style>

</head>
<body>

<h1>StaffGo</h1>

<!-- MENU -->
<button onclick="abrirSecao('secao-vagas')">Ver vagas</button>
<button onclick="abrirSecao('secao-empresa')">Sou empresa</button>
<button onclick="abrirSecao('secao-candidato')">Sou candidato</button>

<hr>

<!-- VAGAS -->
<div id="secao-vagas">
  <h2>Vagas disponíveis</h2>
  <div id="mensagem-vagas"></div>
  <div id="vagas"></div>
</div>

<!-- EMPRESA -->
<div id="secao-empresa" style="display:none">

  <h2>Área da Empresa</h2>

  <div id="empresa-auth">
    <input id="empresa-nome-cadastro" placeholder="Nome da empresa">
    <input id="empresa-email" placeholder="Email">
    <input id="empresa-senha" type="password" placeholder="Senha">

    <button onclick="cadastrarEmpresa()">Cadastrar</button>
    <button onclick="loginEmpresa()">Entrar</button>

    <div id="mensagem-auth"></div>
  </div>

  <div id="empresa-logada-box" class="oculto">
    <p><strong>Empresa:</strong> <span id="empresa-logada-nome"></span></p>
    <button onclick="logoutEmpresa()">Sair</button>
  </div>

  <div id="empresa-painel-conteudo" class="oculto">

    <h3>Cadastrar vaga</h3>

    <input id="titulo" placeholder="Título">
    <input id="empresa" placeholder="Empresa">
    <input id="cidade" placeholder="Cidade">
    <input id="salario" placeholder="Salário">
    <textarea id="descricao" placeholder="Descrição"></textarea>

    <button onclick="salvarOuAtualizarVaga()">Salvar vaga</button>

    <div id="mensagem-empresa"></div>

    <h3>Minhas vagas</h3>
    <div id="mensagem-vagas-empresa"></div>
    <div id="vagas-empresa"></div>

  </div>

</div>

<!-- CANDIDATO -->
<div id="secao-candidato" style="display:none">

  <h2>Área do Candidato</h2>

  <div id="candidato-auth">
    <input id="cand-nome-cadastro" placeholder="Seu nome">
    <input id="cand-email" placeholder="Email">
    <input id="cand-senha" type="password" placeholder="Senha">

    <button onclick="cadastrarCandidato()">Cadastrar</button>
    <button onclick="loginCandidato()">Entrar</button>

    <div id="mensagem-candidato-auth"></div>
  </div>

  <div id="candidato-logado-box" class="oculto">
    <p><strong>Logado como:</strong> <span id="candidato-logado-nome"></span></p>
    <button onclick="logoutCandidato()">Sair</button>
  </div>

  <div id="candidato-painel" class="oculto">
    <h3>Minhas candidaturas</h3>
    <div id="minhas-candidaturas"></div>
  </div>

</div>

<!-- MODAL CANDIDATURA -->
<div id="modal-candidatura-fundo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000a;">

  <div style="background:#1e293b; padding:20px; margin:100px auto; width:300px; border-radius:8px;">

    <h3>Candidatar-se</h3>

    <input id="cand-nome" placeholder="Nome">
    <input id="cand-whatsapp" placeholder="WhatsApp">
    <textarea id="cand-experiencia" placeholder="Experiência"></textarea>

    <button onclick="enviarCandidatura()">Enviar</button>
    <button onclick="fecharModalCandidatura()">Fechar</button>

    <div id="mensagem-candidatura"></div>

  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
