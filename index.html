<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>StaffGo</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding: 20px;
  margin: 0;
}

h1, h2, h3 {
  color: white;
}

button {
  margin: 5px;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 8px;
  border: none;
  font-weight: bold;
}

input, textarea, select {
  display: block;
  margin: 10px 0;
  padding: 10px;
  width: 320px;
  max-width: 100%;
  border-radius: 8px;
  border: none;
  box-sizing: border-box;
}

textarea {
  min-height: 90px;
}

hr {
  margin: 20px 0;
  border-color: #334155;
}

.vaga, .candidato {
  background: #1e293b;
  padding: 15px;
  margin: 12px 0;
  border-radius: 10px;
}

.oculto {
  display: none;
}

.acao-empresa {
  background: #22c55e;
}

.acao-candidato {
  background: #38bdf8;
}

.acao-alerta {
  background: #ef4444;
  color: white;
}

.acao-neutra {
  background: #94a3b8;
  color: #0f172a;
}

#modal-candidatura-fundo,
#modal-candidatos-fundo {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1000;
  overflow-y: auto;
}

.modal-box {
  background: #1e293b;
  padding: 20px;
  margin: 60px auto;
  width: 420px;
  max-width: calc(100% - 40px);
  border-radius: 10px;
}

.linha-status {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.mensagem {
  margin-top: 10px;
  color: #cbd5e1;
}

.filtros-box {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.filtros-linha {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: end;
}

.filtros-linha input {
  margin: 0;
}

.filtro-item {
  min-width: 220px;
}

.filtro-item label {
  display: block;
  margin-bottom: 6px;
  font-weight: bold;
}

@media (max-width: 700px) {
  .filtros-linha {
    flex-direction: column;
    align-items: stretch;
  }

  .filtro-item {
    min-width: auto;
    width: 100%;
  }

  .filtro-item input {
    width: 100%;
  }
}
</style>
</head>
<body>

<h1>StaffGo</h1>

<button onclick="abrirSecao('secao-vagas')">Ver vagas</button>
<button onclick="abrirSecao('secao-empresa')">Sou empresa</button>
<button onclick="abrirSecao('secao-candidato')">Sou candidato</button>

<hr>

<!-- VAGAS -->
<div id="secao-vagas">
  <h2>Vagas disponíveis</h2>

  <div class="filtros-box">
    <h3>Buscar vagas</h3>

    <div class="filtros-linha">
      <div class="filtro-item">
        <label for="filtro-titulo">Cargo / vaga</label>
        <input id="filtro-titulo" placeholder="Ex: Recepcionista">
      </div>

      <div class="filtro-item">
        <label for="filtro-cidade">Cidade</label>
        <input id="filtro-cidade" placeholder="Ex: São Paulo">
      </div>

      <div>
        <button class="acao-candidato" onclick="aplicarFiltrosVagas()">Filtrar</button>
        <button class="acao-neutra" onclick="limparFiltrosVagas()">Limpar filtros</button>
      </div>
    </div>
  </div>

  <div id="mensagem-vagas" class="mensagem"></div>
  <div id="vagas"></div>
</div>

<!-- EMPRESA -->
<div id="secao-empresa" style="display:none">

  <h2>Área da Empresa</h2>

  <div id="empresa-auth">
    <input id="empresa-nome-cadastro" placeholder="Nome da empresa">
    <input id="empresa-email" placeholder="Email">
    <input id="empresa-senha" type="password" placeholder="Senha">

    <button class="acao-empresa" onclick="cadastrarEmpresa()">Cadastrar</button>
    <button class="acao-candidato" onclick="loginEmpresa()">Entrar</button>

    <div id="mensagem-auth" class="mensagem"></div>
  </div>

  <div id="empresa-logada-box" class="oculto">
    <p><strong>Empresa:</strong> <span id="empresa-logada-nome"></span></p>
    <button class="acao-alerta" onclick="logoutEmpresa()">Sair</button>
  </div>

  <div id="empresa-painel-conteudo" class="oculto">

    <h3>Cadastrar vaga</h3>

    <input id="titulo" placeholder="Título">
    <input id="empresa" placeholder="Empresa">
    <input id="cidade" placeholder="Cidade">
    <input id="salario" placeholder="Salário">
    <textarea id="descricao" placeholder="Descrição"></textarea>

    <button class="acao-empresa" onclick="salvarOuAtualizarVaga()">Salvar vaga</button>

    <div id="mensagem-empresa" class="mensagem"></div>

    <h3>Minhas vagas</h3>
    <div id="mensagem-vagas-empresa" class="mensagem"></div>
    <div id="vagas-empresa"></div>

  </div>

</div>

<!-- CANDIDATO -->
<div id="secao-candidato" style="display:none">

  <h2>Área do Candidato</h2>

  <div id="candidato-auth">
    <input id="cand-nome-cadastro" placeholder="Seu nome">
    <input id="cand-email" placeholder="Email">
    <input id="cand-senha" type="password" placeholder="Senha">

    <button class="acao-empresa" onclick="cadastrarCandidato()">Cadastrar</button>
    <button class="acao-candidato" onclick="loginCandidato()">Entrar</button>

    <div id="mensagem-candidato-auth" class="mensagem"></div>
  </div>

  <div id="candidato-logado-box" class="oculto">
    <p><strong>Logado como:</strong> <span id="candidato-logado-nome"></span></p>
    <button class="acao-alerta" onclick="logoutCandidato()">Sair</button>
  </div>

  <div id="candidato-painel" class="oculto">
    <h3>Minhas candidaturas</h3>
    <div id="minhas-candidaturas"></div>
  </div>

</div>

<!-- MODAL CANDIDATURA -->
<div id="modal-candidatura-fundo">
  <div class="modal-box">
    <h3>Candidatar-se</h3>

    <input id="cand-nome" placeholder="Nome">
    <input id="cand-whatsapp" placeholder="WhatsApp">
    <textarea id="cand-experiencia" placeholder="Experiência"></textarea>

    <button class="acao-empresa" onclick="enviarCandidatura()">Enviar</button>
    <button class="acao-alerta" onclick="fecharModalCandidatura()">Fechar</button>

    <div id="mensagem-candidatura" class="mensagem"></div>
  </div>
</div>

<!-- MODAL CANDIDATOS DA EMPRESA -->
<div id="modal-candidatos-fundo">
  <div class="modal-box">
    <h3>Candidatos da vaga</h3>
    <div id="lista-candidatos"></div>
    <div id="mensagem-candidatos" class="mensagem"></div>
    <button class="acao-alerta" onclick="fecharModalCandidatos()">Fechar</button>
  </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
